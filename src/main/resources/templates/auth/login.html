<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign In</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1 shrink-to-fit=no">
    <link rel="stylesheet" href="/login.css" th:href="@{/login.css}" type="text/css">
</head>
<body>
<div class="container">
    <div class="row">
        <h2>Login with Socials</h2>
        <div class="col">
            <a href="/oauth2/authorization/github" class="github btn">
                <i class="fa fa-github fa-fw"></i> Login with GitHub
            </a>
            <a href="/oauth2/authorization/google" class="google btn">
                <i class="fa fa-google fa-fw"></i> Login with Google
            </a>
        </div>
    </div>
</div>
</body>
</html>
