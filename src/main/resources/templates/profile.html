<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <p>Name: <span th:text="${name}">No name</span></p>
    <div th:if="${avatarUrl}">
        <img th:src="${avatarUrl}" alt="Profile Avatar">
    </div>
    <div th:if="${picture}">
        <img th:src="${picture}" alt="Profile Photo">
    </div>
</body>
</html>
