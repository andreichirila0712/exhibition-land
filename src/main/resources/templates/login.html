<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
        font-family: "Times New Roman", Georgia, serif;
        }

        * {
        box-sizing: border-box;
        }

        .container {
        position: absolute;
        border-radius: 5px;
        background-color: rgba(180, 180, 180, 0.05);
        padding: 20px 0 30px 0;
        top: 50%;
        left: 50%;
        margin-right: -50%;
        transform: translate(-50%, -50%);
        }

        input, .btn {
        width: 95%;
        padding: 12px;
        top: 50%;
        left: 50%;
        margin-right: -50%;
        border: none;
        border-radius: 4px;
        margin: 10px;
        opacity: 1;
        display: inline-block;
        font-size: 17px;
        line-height: 20px;
        text-decoration: none;
        }

        input:hover, .btn:hover {
        opacity: 1;
        }

        .github {
        background-color: #000000;
        color: white;
        }

        .google {
        background-color: #dd4b39;
        color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <h2 style="text-align:center; font-family: monospace; font-style: oblique; font-variant: small-caps">Login with Socials</h2>
            <div class="col">
                <a href="/oauth2/authorization/github" class="github btn">
                    <i class="fa fa-github fa-fw"></i> Login with GitHub
                </a>
                <a href="/oauth2/authorization/google" class="google btn">
                    <i class="fa fa-google fa-fw"></i> Login with Google
                </a>
            </div>
    </div>
</div>
</body>
</html>
