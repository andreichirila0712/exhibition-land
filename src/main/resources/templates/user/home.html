<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=1.0">
    <link rel="stylesheet" href="/css/output.css" type="text/css" th:href="@{/css/output.css}">
    <title>Home</title>
</head>
<body>
<div class="navbar bg-base-200 shadow-sm">
    <div class="flex-1">
        <a href="/home" class="btn btn-ghost text-base-content text-xl">Home</a>
    </div>
    <div class="flex gap-2">
        <a href="/projects" class="btn btn-ghost text-base-content text-xl">Projects</a>
        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto"/>
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
                <div class="w-10 rounded-full">
                    <img th:src="${userPhoto}" alt="avatar"/>
                </div>
            </div>
            <ul tabindex="-1"
                class="menu menu-sm dropdown-content bg-base-200 rounded-box z-1 mt-3 w-52 p-2 shadow">
                <li><a href="/profile">Profile</a></li>
                <li><a>Settings</a></li>
                <li><form th:action="@{/logout}" method="post">
                    <button style="background: none!important; border: none; padding: 0!important; cursor: pointer;">Logout</button>
                </form>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
